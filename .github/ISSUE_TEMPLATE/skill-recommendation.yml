name: 推荐 RedFox Skill
description: 推荐一个适合加入或重点展示的 RedFox Skill
title: "feat: 推荐 RedFox skill "
labels: ["skill-candidate"]
body:
  - type: input
    id: skill_name
    attributes:
      label: Skill 名称或 skillCode
      placeholder: multi-wordcheck
    validations:
      required: true
  - type: input
    id: redfox_url
    attributes:
      label: RedFox 详情页
      placeholder: https://redfox.hk/skills/no/wn2Hrw42
    validations:
      required: false
  - type: input
    id: github_url
    attributes:
      label: GitHub 源码链接
      placeholder: https://github.com/redfox-data/redfox-community/tree/main/skills/multi-wordcheck
    validations:
      required: false
  - type: checkboxes
    id: audiences
    attributes:
      label: 适合人群
      options:
        - label: 自媒体创作者
        - label: 公众号运营
        - label: 小红书创作者
        - label: 抖音运营
        - label: 数据分析
        - label: 效率工具用户
        - label: Agent/开发者
  - type: dropdown
    id: category
    attributes:
      label: 建议分类
      options:
        - 公众号创作技能包
        - 小红书创作技能包
        - 创作助手
        - 灵感解析
        - 数据查询
        - 账号分析
        - 作品分析
        - 热门榜单
        - 效率工具
        - 其他
    validations:
      required: true
  - type: textarea
    id: use_cases
    attributes:
      label: 主要使用场景
      description: 说明这个 skill 解决什么问题，适合在哪些工作流里使用。
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: 推荐理由
      description: 说明为什么值得加入或重点展示。
    validations:
      required: true
