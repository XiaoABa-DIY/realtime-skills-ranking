name: 质量检查

on:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 输出运行时版本
        run: |
          node --version
          npm --version

      - name: 安装依赖
        run: npm install

      - name: 刷新 RedFox 数据快照
        run: npm run data:update
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: 检查格式
        run: npm run format:check

      - name: 运行 lint
        run: npm run lint

      - name: 运行单元测试
        run: npm run test

      - name: 构建静态站点
        run: npm run build

      - name: 安装 Playwright 浏览器
        run: npx playwright install --with-deps chromium

      - name: 运行端到端测试
        run: npm run test:e2e
