name: Refresh data and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Print runtime versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Restore deployed history
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p public/data
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git show origin/gh-pages:data/history.json > public/data/history.json || true
          fi

      - name: Refresh GitHub data snapshot
        run: npm run data:update
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build static site for tests
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests
        run: npm run test:e2e

      - name: Build Pages static site
        run: |
          rm -rf dist
          npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Publish dist to gh-pages
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          rm -rf .deploy
          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add .deploy origin/gh-pages
          else
            git worktree add --detach .deploy
            cd .deploy
            git checkout --orphan gh-pages
            cd ..
          fi

          cd .deploy
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ../dist/. .
          touch .nojekyll
          git add -A

          if git diff --cached --quiet; then
            echo "No Pages changes to deploy."
          else
            git commit -m "chore: 部署 GitHub Pages 静态产物"
          fi

          git push origin HEAD:gh-pages
