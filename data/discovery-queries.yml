queries:
  - id: skill-md-stars
    query: "SKILL.md skills"
    limit: 12
    category: 提示词/工作流
    reason:
      zh: GitHub 仓库描述中明确提到 SKILL.md 和 skills。
      en: Repository description mentions SKILL.md and skills.

  - id: chinese-skills
    query: "SKILL.md 中文 skills"
    limit: 12
    category: 中文本地化
    reason:
      zh: 可能是带中文说明或中文教程的 SKILL.md 项目。
      en: Potential SKILL.md project with Chinese docs or tutorials.

  - id: codex-skills
    query: "codex-skills"
    limit: 12
    category: 编程开发
    reason:
      zh: 可能适配 Codex 或 SKILL.md 标准的开发者技能项目。
      en: Potential developer skill project compatible with Codex or the SKILL.md standard.

  - id: design-skills
    query: "design SKILL.md skills"
    limit: 10
    category: 设计与多媒体
    reason:
      zh: 可能包含设计、UI 或多媒体相关 SKILL.md。
      en: Potential design, UI, or media SKILL.md repository.

  - id: research-skills
    query: "research SKILL.md skills"
    limit: 10
    category: 数据研究
    reason:
      zh: 可能包含研究、资料整理或报告生成相关 Skill。
      en: Potential research, synthesis, or report-generation skill repository.
